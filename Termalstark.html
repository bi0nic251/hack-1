<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stark Secure Server RPG</title>
<style>
body { background: #000; color: #0ff; font-family: "Courier New", monospace; padding: 20px; margin:0; }
.output { white-space: pre-wrap; line-height: 1.2em; max-height: 80vh; overflow-y: auto; }
.link { color: #0f0; cursor: pointer; text-decoration: underline; }
#input { background: #000; color: #0ff; border: none; font-family: "Courier New", monospace; font-size: 1em; outline: none; width: 80%; }
#statsPanel {
  position: fixed;
  top: 10px;
  right: 10px;
  width: 240px;
  background: rgba(0,0,0,0.85);
  border: 1px solid #0ff;
  padding: 10px;
  font-family: "Courier New", monospace;
  font-size: 12px;
  color: #0ff;
  line-height: 1.2em;
  z-index: 100;
}
#statsPanel h3 { text-align:center; margin:0 0 5px 0; font-size:14px; color:#0f0; }
#controls { position: fixed; bottom: 10px; right: 10px; }
#controls button { margin-left:5px; font-family:"Courier New", monospace; font-size:12px; }
</style>
</head>
<body>

<h2>STARK SECURE SERVER RPG</h2>
<div class="output" id="terminal"></div>
<input type="password" id="input" placeholder="Enter Password..." autofocus>

<div id="statsPanel">
  <h3>STARK HUD</h3>
  <p id="hp">HP: 100 / 100</p>
  <p id="energy">Energy: 100 / 100</p>
  <p id="dollars">Dollars: $100.00</p>
  <p id="armor">Armor: Mark VI</p>
  <p id="abilities">Abilities: None</p>
  <p id="ai">J.A.R.V.I.S Level: 1</p>
</div>

<div id="controls">
  <button id="saveBtn">Save</button>
  <button id="loadBtn">Load</button>
  <button id="resetBtn">Reset</button>
</div>

<script>
const terminal = document.getElementById("terminal");
const input = document.getElementById("input");

const PASSWORD = "!ronmanRox95";
let attempts = 0;
const MAX_ATTEMPTS = 3;

// Player stats
let player = {
    hp: 100, maxHp: 100,
    energy: 100, maxEnergy: 100,
    damageMin: 5, damageMax: 20,
    armor: "Mark VI",
    upgrades: [],
    abilities: [],
    aiLevel: 1,
    dollars: 100.00
};

// Suits
let suits = [];
for(let i=6;i<=75;i++){
    suits.push({
        id:i,
        name:`Mark ${i}`,
        hpBonus:Math.floor(Math.random()*30),
        energyBonus:Math.floor(Math.random()*30),
        damageBonusMin:Math.floor(Math.random()*5),
        damageBonusMax:Math.floor(Math.random()*15),
        ability:`Ability ${i}`,
        unlocked:i===6,
        cost:parseFloat((50+i*10+Math.random()).toFixed(2))
    });
}

// Bosses
const bosses = [
    {name:"Iron Monger",hp:120,attackMin:10,attackMax:20,tech:"Reinforced Armor Plating",unlockSuit:15,aiUpgrade:2,reward:100.50},
    {name:"Whiplash",hp:90,attackMin:15,attackMax:25,tech:"Energy Whip Integration",unlockSuit:35,aiUpgrade:3,reward:150.25},
    {name:"Killian",hp:150,attackMin:12,attackMax:22,tech:"Extremis Energy Core",unlockSuit:47,aiUpgrade:4,reward:200.75}
];

// Extra enemies
const extraEnemies = Array.from({length:60},(_,i)=>({
    name:`Enemy Drone ${i+1}`,
    hp:20+Math.floor(Math.random()*50),
    attackMin:3+Math.floor(Math.random()*5),
    attackMax:5+Math.floor(Math.random()*10),
    tech:`Tech Module ${i+1}`,
    reward:parseFloat((10+Math.random()*20).toFixed(2))
}));

let currentEnemy=null;

const favesuitsLinks = [
    "https://marvelcinematicuniverse.fandom.com/wiki/Iron_Man_Armor:_Mark_VI",
    "https://marvelcinematicuniverse.fandom.com/wiki/Iron_Man_Armor:_Mark_XV",
    "https://marvelcinematicuniverse.fandom.com/wiki/Iron_Man_Armor:_Mark_XXXV",
    "https://marvelcinematicuniverse.fandom.com/wiki/Iron_Man_Armor:_Mark_XLVII"
];

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
async function animateText(text,delay=50){for(let c of text){terminal.innerHTML+=c; await sleep(delay);} terminal.innerHTML+="\n";}

async function animatedLogin(){
    terminal.innerHTML="";
    await animateText("[Connecting to Stark Secure Server");
    for(let i=0;i<5;i++){terminal.innerHTML+="."; await sleep(400);}
    terminal.innerHTML+="]\n";
}

async function authenticate(){
    await animatedLogin();
    terminal.innerHTML+="Enter Password: "; 
    input.type="password"; input.focus();
}

function updateStatsPanel(){
    document.getElementById("hp").textContent=`HP: ${player.hp} / ${player.maxHp}`;
    document.getElementById("energy").textContent=`Energy: ${player.energy} / ${player.maxEnergy}`;
    document.getElementById("dollars").textContent=`Dollars: $${player.dollars.toFixed(2)}`;
    document.getElementById("armor").textContent=`Armor: ${player.armor}`;
    document.getElementById("abilities").textContent=`Abilities: ${player.abilities.join(", ") || "None"}`;
    document.getElementById("ai").textContent=`J.A.R.V.I.S Level: ${player.aiLevel}`;
}

async function suitBootSequence(suitName){
    const bootLines=[
        "[Initializing Armor Systems]",
        "loading_core_modules()",
        "checking_power_levels()",
        "boot_repulsor_drivers()",
        "linking_ai_interface()",
        "mounting_weapon_systems()",
        "calibrating_flight_stabilizers()",
        "running_diagnostics()",
        "repulsor_driver_status = OK",
        "flight_control_status = OK",
        "targeting_system_status = OK",
        "[Armor Online]"
    ];
    for(let line of bootLines){
        terminal.innerHTML+=line+"\n";
        await sleep(300);
    }
    terminal.innerHTML+=`>>> ${suitName} DEPLOYED <<<\n\n`;
}

async function startJarvis(){
    input.type="text"; 
    input.placeholder="J.A.R.V.I.S> Type commands here...";
    await animateText("[Stark Secure Server Online]\n"); 
    terminal.innerHTML+="Type 'help' to see commands.\n";
    updateStatsPanel();
}

// Spawn enemies
function spawnEnemy(isBoss=false){
    if(currentEnemy) return;
    currentEnemy=isBoss?JSON.parse(JSON.stringify(bosses[Math.floor(Math.random()*bosses.length)])):
                        JSON.parse(JSON.stringify(extraEnemies[Math.floor(Math.random()*extraEnemies.length)]));
    terminal.innerHTML+=`\nAlert! Enemy Encounter: ${currentEnemy.name} (HP: ${currentEnemy.hp})\n`;
}

function enemyAttack(){
    if(currentEnemy && currentEnemy.hp>0){
        let dmg=Math.floor(Math.random()*(currentEnemy.attackMax-currentEnemy.attackMin+1))+currentEnemy.attackMin;
        player.hp=Math.max(0,player.hp-dmg);
        terminal.innerHTML+=`${currentEnemy.name} attacks! You take ${dmg} damage. HP: ${player.hp}\n`;
        updateStatsPanel();
        if(player.hp<=0){ terminal.innerHTML+="You were defeated! Reload terminal.\n"; input.disabled=true; }
    }
}

// Integrate tech
function integrateTech(enemy){
    const tech=enemy.tech;
    terminal.innerHTML+=`You scanned and integrated '${tech}' into all suits!\n`;
    player.upgrades.push(tech);
    player.hp+=20; player.maxHp+=20;
    player.energy+=20; player.maxEnergy+=20;
    player.damageMin+=5; player.damageMax+=10;
    player.dollars+=enemy.reward;
    terminal.innerHTML+=`Earned $${enemy.reward.toFixed(2)}! Total: $${player.dollars.toFixed(2)}\n`;

    suits.forEach(s=>{
        s.hpBonus+=5; s.energyBonus+=5;
        s.damageBonusMin+=2; s.damageBonusMax+=3;
        s.ability+=` + ${tech}`;
    });

    if(enemy.unlockSuit){ const s=suits.find(x=>x.id===enemy.unlockSuit); if(s) s.unlocked=true; }
    if(enemy.aiUpgrade && enemy.aiUpgrade>player.aiLevel){ player.aiLevel=enemy.aiUpgrade; terminal.innerHTML+=`J.A.R.V.I.S upgraded to Level ${player.aiLevel}!\n`; }
    updateStatsPanel();
    currentEnemy=null;
}

// AI Upgrade Command
async function upgradeAI(){
    terminal.innerHTML+="Initiating J.A.R.V.I.S AI Upgrade Sequence...\n";
    let startTime=Date.now();
    let duration=3*60*1000; // 3 minutes
    const fakeCode=[
        "loading_core_modules()",
        "compiling_ai_kernels()",
        "initializing_neural_networks()",
        "optimizing_reactor_interface()",
        "linking_suit_protocols()",
        "calibrating_targeting_systems()",
        "running_diagnostics()",
        "enhancing_energy_distribution()",
        "updating_combat_algorithms()",
        "syncing_enemy_databases()",
        "integrating_new_abilities()",
        "verifying_security_protocols()",
        "finalizing_upgrade()"
    ];
    let lineIndex=0;
    while(Date.now()-startTime<duration){
        terminal.innerHTML+=fakeCode[lineIndex%fakeCode.length]+"\n";
        terminal.scrollTop=terminal.scrollHeight;
        lineIndex++;
        await sleep(300); // speed of fake code lines
    }
    player.aiLevel++;
    terminal.innerHTML+=`J.A.R.V.I.S AI Upgrade Complete! Level: ${player.aiLevel}\n`;
    updateStatsPanel();
}

// Command handler
input.addEventListener("keydown",async e=>{
    if(e.key==="Enter" && input.type==="text"){
        const cmd=input.value.trim(); input.value=""; if(!cmd) return;
        terminal.innerHTML+=`J.A.R.V.I.S> ${cmd}\n`;
        const args=cmd.split(" ");
        switch(args[0].toLowerCase()){
            case "help": terminal.innerHTML+="Commands: status, equip [suit #], attack, repair, rest, favesuits, build [suit #], spawnboss, spawnenemy, upgradeAI, save, load, reset, exit\n"; break;
            case "status": 
                terminal.innerHTML+=`HP: ${player.hp}/${player.maxHp}\nEnergy: ${player.energy}/${player.maxEnergy}\nDollars: $${player.dollars.toFixed(2)}\nArmor: ${player.armor}\nUpgrades: ${player.upgrades.join(", ") || "None"}\nAbilities: ${player.abilities.join(", ") || "None"}\nJ.A.R.V.I.S Level: ${player.aiLevel}\n`; 
                break;
            case "upgradeai": upgradeAI(); break;
            // Include all previous command cases (equip, attack, rest, build, etc.)...
            default: terminal.innerHTML+="Unknown command. Type 'help'.\n";
        }
        terminal.scrollTop=terminal.scrollHeight;
    }
});

// Buttons
document.getElementById("saveBtn").onclick=()=>{ localStorage.setItem("starkSave",JSON.stringify(player)); terminal.innerHTML+="Game saved!\n"; };
document.getElementById("loadBtn").onclick=()=>{ 
    let data=localStorage.getItem("starkSave"); 
    if(data){ player=JSON.parse(data); terminal.innerHTML+="Game loaded!\n"; updateStatsPanel(); } 
    else terminal.innerHTML+="No saved game found.\n"; 
};
document.getElementById("resetBtn").onclick=()=>{ if(confirm("Reset game?")){ localStorage.removeItem("starkSave"); location.reload(); } };

authenticate();
</script>
</body>
</html>
